version: '3.8'

services:
  web:
    # networks:
    #   - brainstorm-network
    build: .
    command: bash -c ' poetry run alembic upgrade head && poetry run uvicorn app.api:app --host 0.0.0.0'
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgrespw@host.docker.internal:5432
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=26379
      - NEO4J_URI=bolt://brainstorm-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - ADMIN_ENABLED=${ADMIN_ENABLED:-false}
      - ADMIN_WHITELISTED_PUBKEYS=${ADMIN_WHITELISTED_PUBKEYS:-}
    depends_on:
      brainstorm-database:
        condition: service_healthy
      brainstorm-neo4j:
        condition: service_healthy
      # brainstorm-redis-stack:
      #   condition: service_healthy
    restart: on-failure

  brainstorm-database:
    # networks:
    #   - brainstorm-network

    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: brainstorm-database
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

